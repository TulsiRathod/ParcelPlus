# Application Name
spring.application.name=ParclePlus

# Server port (hosts such as Render inject PORT)
server.port=${PORT:8080}

## PostgreSQL Database connection details (provided via environment variables).
## Either set DB_URL directly, or let it be composed from DB_HOST/DB_PORT/DB_NAME/DB_SSLMODE.
spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:parcelplus}?sslmode=${DB_SSLMODE:disable}}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate (JPA) properties
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Use "validate" (or run migrations) in production; override via env if needed.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# Connection Pool configuration (HikariCP)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}
spring.datasource.hikari.connection-timeout=30000

# CORS Configuration (comma-separated list of allowed origins)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# JWT configuration. The secret MUST be overridden in production (>= 32 chars for HS256).
app.jwt.secret=${JWT_SECRET:change-me-dev-secret-please-override-with-a-long-random-value}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
